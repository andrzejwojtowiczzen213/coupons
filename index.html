<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InPost – Home Screen</title>

  <!--
    Fonts:
    - Archivo  → Aura DS "font-family/primary"
    - Saira    → Prototype fallback for InPost Display ("--font-family-secondary")
      Per Aura DS pattern "Prototype Font Fallback: Saira for InPost Display"
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────────
       Aura Design System — CSS Custom Properties
       Sources: Neo4j (InPost - Color Primitives,
       component tokens) + Figma design context
    ───────────────────────────────────────────── */
    :root {
      /* ── Color Primitives – InPost brand ── */
      --inpost-grey-0:        #FEFEFE;
      --inpost-grey-100:      #F4F4F4;
      --inpost-grey-200:      #E1E1E1;
      --inpost-grey-400:      #8E8E8E;
      --inpost-grey-400-a15:  rgba(142, 142, 142, 0.15);
      --inpost-grey-900:      #1D1D1D;

      --inpost-yellow-600:    #FFCC05;
      --inpost-yellow-800:    #EFB503;

      /* ── Typography ── */
      --font-family-primary:   'Archivo', sans-serif;
      --font-family-secondary: 'Saira', sans-serif; /* InPost Display fallback */

      /* Font sizes (rem-scaled from base 16px) */
      --font-size-0_75:  12px;
      --font-size-0_875: 14px;
      --font-size-1:     16px;
      --font-size-1_25:  20px;
      --font-size-1_5:   24px;

      /* Font weights */
      --font-weight-medium:    500;
      --font-weight-semi-bold: 600;
      --font-weight-bold:      700;
      --font-weight-black:     900;

      /* ── Spacing ── */
      --spacing-0:   0px;
      --spacing-4:   4px;
      --spacing-8:   8px;
      --spacing-12:  12px;
      --spacing-16:  16px;
      --spacing-20:  20px;

      /* ── Radius ── */
      --radius-md:   4px;

      /* ── General ── */
      --general-background: var(--inpost-grey-100);

      /* ── Home Card component tokens ── */
      --home-card-role-neutral-bg:        var(--inpost-grey-0);
      --home-card-role-neutral-label:     var(--inpost-grey-900);
      --home-card-size-medium-padding-h:  var(--spacing-16);
      --home-card-size-medium-padding-v:  var(--spacing-12);
      --home-card-size-medium-gap:        var(--spacing-12);
      --home-card-size-medium-radius:     8px;

      /* ── Bar Top component tokens ── */
      --bar-top-role-neutral-bg:       rgba(255, 255, 255, 0);
      --bar-top-role-neutral-border:   rgba(255, 255, 255, 0);
      --bar-top-role-neutral-label:    var(--inpost-grey-900);
      --bar-top-role-neutral-native:   var(--inpost-grey-900);
      --bar-top-size-medium-gap:       var(--spacing-4);
      --bar-top-size-medium-padding-h: var(--spacing-20);
      --bar-top-size-medium-padding-v: var(--spacing-8);

      /* ── Bar Top Button component tokens ── */
      --bar-top-button-role-neutral-bg: var(--inpost-grey-0);
      --bar-top-button-size-medium-radius: 8px;

      /* ── Bar Top Incoins ── */
      --on-primary: var(--inpost-grey-900);

      /* ── Bar Bottom component tokens ── */
      --bar-bottom-role-neutral-bg:     rgba(254, 254, 254, 0.65);
      --bar-bottom-role-neutral-border: rgba(142, 142, 142, 0.15);
      --bar-bottom-role-neutral-native: var(--inpost-grey-900);

      /* ── Bar Bottom Tab component tokens ── */
      --bar-bottom-tab-role-neutral-bg:       rgba(255, 255, 255, 0);
      --bar-bottom-tab-role-neutral-label:    var(--inpost-grey-900);
      --bar-bottom-tab-size-medium-gap:       var(--spacing-4);
      --bar-bottom-tab-size-medium-padding-h: var(--spacing-0);
      --bar-bottom-tab-size-medium-padding-v: var(--spacing-8);

      /* ── Bar Bottom Button (CTA) component tokens ── */
      --bar-bottom-button-role-neutral-bg:     var(--inpost-grey-900);
      --bar-bottom-button-role-neutral-border: rgba(142, 142, 142, 0.15);
      --bar-bottom-button-role-neutral-icon:   var(--inpost-yellow-600);
      --bar-bottom-button-size-medium-radius:  var(--radius-md);
    }

    /* ─────────────────────────────────────────────
       Reset & Base
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #C8C8C8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 0;
      font-family: var(--font-family-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────────
       Screen shell (360 × 780 px — iPhone 16/16+)
    ───────────────────────────────────────────── */
    .screen {
      position: relative;
      width: 360px;
      height: 780px;
      background: var(--general-background);
      overflow: hidden;
      border-radius: 44px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    /* ─────────────────────────────────────────────
       Top Bar  (position: absolute, z=10)
    ───────────────────────────────────────────── */
    .bar-top {
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      background: var(--bar-top-role-neutral-bg);
      border-bottom: 1px solid var(--bar-top-role-neutral-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
    }

    /* iOS status bar row */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      height: 44px;
    }

    .status-bar__time {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 22px;
      color: var(--bar-top-role-neutral-native);
      letter-spacing: -0.3px;
    }

    .status-bar__icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Top bar content row */
    .top-bar-content {
      display: flex;
      align-items: center;
      gap: var(--bar-top-size-medium-gap);
      padding:
        0
        var(--bar-top-size-medium-padding-h)
        var(--bar-top-size-medium-padding-v);
    }

    .top-bar-welcome {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* InPost signet 32×32 */
    .inpost-signet {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      overflow: hidden;
    }

    .hello-label {
      font-family: var(--font-family-primary);
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-1);
      line-height: var(--font-size-1_5);
      color: var(--bar-top-role-neutral-label);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-bar-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* InCoins display */
    .incoins {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
    }

    .incoins__amount {
      font-family: var(--font-family-secondary);
      font-size: var(--font-size-1);
      font-weight: 400;
      line-height: var(--font-size-1);
      letter-spacing: -0.32px;
      color: var(--on-primary);
      white-space: nowrap;
    }

    .incoins__icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Basket button */
    .basket-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--bar-top-button-role-neutral-bg);
      border: none;
      border-radius: var(--bar-top-button-size-medium-radius);
      cursor: pointer;
      overflow: hidden;
      padding: 0;
    }

    /* ─────────────────────────────────────────────
       Scrollable content area
    ───────────────────────────────────────────── */
    .scrollable {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding-top: 120px;   /* clear top bar */
      padding-bottom: 130px; /* clear bottom bar */
      /* hide scrollbar */
      scrollbar-width: none;
    }
    .scrollable::-webkit-scrollbar { display: none; }

    /* ─────────────────────────────────────────────
       Bento 2-column grid
    ───────────────────────────────────────────── */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: var(--spacing-8) var(--spacing-20);
    }

    /* ─────────────────────────────────────────────
       Home Card
    ───────────────────────────────────────────── */
    .home-card {
      background: var(--home-card-role-neutral-bg);
      border-radius: var(--home-card-size-medium-radius);
      min-height: 172px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      padding:
        var(--home-card-size-medium-padding-v)
        var(--home-card-size-medium-padding-h);
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .home-card:active { opacity: 0.75; }

    .card-inner {
      display: flex;
      flex-direction: column;
      gap: var(--home-card-size-medium-gap);
      align-items: flex-end;
      width: 100%;
    }

    .card-icon-row {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 8px;
      height: 68px;
      width: 100%;
    }

    .card-counter {
      font-family: var(--font-family-secondary);
      font-size: 28px;
      font-weight: var(--font-weight-black);
      line-height: 28px;
      color: var(--home-card-role-neutral-label);
      padding: 4px 0;
      align-self: center;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      color: var(--home-card-role-neutral-label);
    }

    .card-label {
      font-family: var(--font-family-primary);
      font-weight: var(--font-weight-semi-bold);
      font-size: var(--font-size-0_875);
      line-height: var(--font-size-1_25);
      color: var(--home-card-role-neutral-label);
      text-align: right;
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    /* ─────────────────────────────────────────────
       Bottom Bar
    ───────────────────────────────────────────── */
    .bar-bottom-wrapper {
      position: absolute;
      inset: auto 0 0 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      background: var(--bar-bottom-role-neutral-bg);
      border-top: 1px solid var(--bar-bottom-role-neutral-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .bar-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 80px;
      padding: 0 8px 4px;
      border-top: 1px solid var(--bar-bottom-role-neutral-border);
    }

    /* ── Nav Tab (regular) ── */
    .nav-tab {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--bar-bottom-tab-size-medium-gap);
      padding:
        var(--bar-bottom-tab-size-medium-padding-v)
        var(--bar-bottom-tab-size-medium-padding-h);
      background: var(--bar-bottom-tab-role-neutral-bg);
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .nav-tab__icon {
      width: 24px;
      height: 24px;
      color: var(--bar-bottom-tab-role-neutral-label);
      flex-shrink: 0;
    }

    .nav-tab__label {
      font-family: var(--font-family-primary);
      font-weight: var(--font-weight-medium);
      font-size: var(--font-size-0_75);
      line-height: var(--font-size-1);
      color: var(--bar-bottom-tab-role-neutral-label);
      text-align: center;
      letter-spacing: 0.06px;
      white-space: nowrap;
    }

    /* ── CTA Tab (Kupuj, centre) ── */
    .nav-cta {
      flex-shrink: 0;
      width: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: var(--bar-bottom-tab-size-medium-gap);
      padding-bottom: var(--spacing-8);
    }

    .cta-button {
      width: 64px;
      height: 64px;
      background: var(--bar-bottom-button-role-neutral-bg);
      border: 1px solid var(--bar-bottom-button-role-neutral-border);
      border-radius: var(--bar-bottom-button-size-medium-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }

    .cta-button__icon {
      width: 56px;
      height: 56px;
      color: var(--bar-bottom-button-role-neutral-icon);
    }

    /* ── iOS Home Indicator ── */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }

    .home-indicator__bar {
      width: 144px;
      height: 5px;
      background: var(--bar-bottom-role-neutral-native);
      border-radius: 100px;
    }
  </style>
</head>
<body>
<div class="screen">

  <!-- ══════════════════════════════════
       TOP BAR
  ═══════════════════════════════════ -->
  <header class="bar-top">

    <!-- iOS Status Bar -->
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-bar__icons">
        <!-- Cellular signal -->
        <svg width="19" height="13" viewBox="0 0 19 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0"  y="7"  width="3" height="6" rx="1" fill="#1D1D1D"/>
          <rect x="4"  y="5"  width="3" height="8" rx="1" fill="#1D1D1D"/>
          <rect x="8"  y="3"  width="3" height="10" rx="1" fill="#1D1D1D"/>
          <rect x="12" y="1"  width="3" height="12" rx="1" fill="#1D1D1D"/>
          <rect x="16" y="0"  width="3" height="13" rx="1" fill="#1D1D1D"/>
        </svg>
        <!-- Wi-Fi -->
        <svg width="17" height="13" viewBox="0 0 17 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="8.5" cy="11.5" r="1.5" fill="#1D1D1D"/>
          <path d="M4.87 7.87A5.25 5.25 0 0 1 8.5 6.5a5.25 5.25 0 0 1 3.63 1.37l1.42-1.42A7.25 7.25 0 0 0 8.5 4.5a7.25 7.25 0 0 0-5.05 1.95L4.87 7.87Z" fill="#1D1D1D"/>
          <path d="M1.11 4.11A10.25 10.25 0 0 1 8.5 1a10.25 10.25 0 0 1 7.39 3.11L17 2.5A12.25 12.25 0 0 0 8.5 0 12.25 12.25 0 0 0 0 2.5l1.11 1.61Z" fill="#1D1D1D"/>
        </svg>
        <!-- Battery -->
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1D1D1D" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="18" height="9" rx="2" fill="#1D1D1D"/>
          <path d="M24 4.5v4c.83-.34 1.5-1.32 1.5-2s-.67-1.66-1.5-2Z" fill="#1D1D1D" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Main top-bar row -->
    <div class="top-bar-content">

      <!-- Welcome area: logo + greeting -->
      <div class="top-bar-welcome">
        <!-- InPost Signet 32×32
             Simplified geometric signet – yellow square with InPost mark rays
             Source: Aura DS InPostSignetSquare / InPost brand signet
        -->
        <div class="inpost-signet" aria-label="InPost">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Yellow background -->
            <rect width="32" height="32" rx="3" fill="#FFCC05"/>
            <!-- InPost signet geometric mark (simplified rays / arrows) -->
            <!-- Horizontal bar -->
            <rect x="5" y="15" width="10" height="3" fill="#1D1D1D"/>
            <!-- Left vertical bar -->
            <rect x="5" y="5" width="3" height="22" fill="#1D1D1D"/>
            <!-- Right arrow-head -->
            <path d="M15 8h3v3h3v3h3v3h-3v3h-3v3h-3V8Z" fill="#1D1D1D" fill-rule="evenodd" clip-rule="evenodd"/>
            <!-- Simplify arrow: just diagonal blocks -->
            <rect x="15" y="5"  width="3" height="3" fill="#1D1D1D"/>
            <rect x="18" y="8"  width="3" height="3" fill="#1D1D1D"/>
            <rect x="21" y="11" width="3" height="10" fill="#1D1D1D"/>
            <rect x="18" y="21" width="3" height="3" fill="#1D1D1D"/>
            <rect x="15" y="24" width="3" height="3" fill="#1D1D1D"/>
          </svg>
        </div>
        <span class="hello-label">Cześć, Agnieszka</span>
      </div>

      <!-- Buttons: InCoins + Basket -->
      <div class="top-bar-buttons">

        <!-- InCoins -->
        <div class="incoins" role="text" aria-label="12 670 InCoins">
          <span class="incoins__amount">12 670</span>
          <!-- ic/in-coin-20dp from Aura DS Neo4j -->
          <div class="incoins__icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15.3846 3.07692H16.9231V4.61538H18.4615V15.3846H16.9231V16.9231H15.3846V18.4615H4.61538V16.9231H3.07691V15.3846H1.53845V4.61538H3.07691V3.07692H4.61538V1.53846H15.3846V3.07692Z" fill="#FFCC05"/>

              <path d="M4.61538 16.9231L15.3846 16.9231V18.4615L4.61538 18.4615V16.9231Z" fill="#EFB503"/>
              <path d="M16.923 15.3846V16.9231H15.3846V15.3846H16.923Z" fill="#FFF287"/>
              <path d="M18.4615 15.3846H16.923V4.61538H18.4615V15.3846Z" fill="#FFF287"/>
              <path d="M16.923 4.61538H15.3846V3.07742H16.923V4.61538Z" fill="#FFF287"/>
              <path d="M15.3846 3.07742L4.61536 3.07692V1.53846H15.3846V3.07742Z" fill="#FFF287"/>
              <path d="M11.2932 15.3847H10.2677V16.4103H9.24167V15.3842H10.2672V14.3586H11.2932V15.3847Z" fill="#1D1D1D"/>
              <path d="M8.20584 13.3336H7.18033V14.3591H6.15428V13.333H7.17979V12.3075H8.20584V13.3336Z" fill="#1D1D1D"/>
              <path d="M13.3334 7.17969H11.2824V8.20525H10.2568V9.23026H11.2818V10.2564H10.2563V11.2819H11.2818V12.3075H13.3328V13.3336H10.2666V12.308H9.23026V11.2819H8.20475L8.20529 8.20471H9.2308V7.17915H10.2672V6.15359H13.3334V7.17969Z" fill="#1D1D1D"/>
              <path d="M7.18033 10.2569H5.12823V9.23077H7.18033V10.2569Z" fill="#1D1D1D"/>
              <path d="M7.18033 6.15359H8.20584V7.17969H7.17979V6.15468H6.15428V5.12858H7.18033V6.15359Z" fill="#1D1D1D"/>
              <path d="M10.2568 4.10248H11.2824V5.12858H10.2563V4.10302H9.2308V3.07692H10.2568V4.10248Z" fill="#1D1D1D"/>
              <path d="M15.3846 20H4.61539V18.4615H15.3846V20Z" fill="#1D1D1D"/>
              <path d="M4.61539 18.4615H3.07742V16.9231H4.61539V18.4615Z" fill="#1D1D1D"/>
              <path d="M16.9231 18.4615H15.3846V16.9231H16.9231V18.4615Z" fill="#1D1D1D"/>
              <path d="M3.07742 16.9231H1.53846V15.3846H3.07692L3.07742 16.9231Z" fill="#1D1D1D"/>
              <path d="M18.4615 16.9231H16.9231V15.3846H18.4615V16.9231Z" fill="#1D1D1D"/>
              <path d="M1.53846 15.3846H0V4.61539H1.53846V15.3846Z" fill="#1D1D1D"/>
              <path d="M20 15.3846H18.4615V4.61539H20V15.3846Z" fill="#1D1D1D"/>
              <path d="M3.07692 4.61539H1.53846V3.07692H3.07692V4.61539Z" fill="#1D1D1D"/>
              <path d="M18.4615 4.61539H16.9231V3.07692H18.4615V4.61539Z" fill="#1D1D1D"/>
              <path d="M4.61539 3.07692H3.07692L3.07742 1.53846H4.61539V3.07692Z" fill="#1D1D1D"/>
              <path d="M16.9231 3.07692H15.3846V1.53846H16.9231V3.07692Z" fill="#1D1D1D"/>
              <path d="M15.3846 1.53846H4.61539V0H15.3846V1.53846Z" fill="#1D1D1D"/>
            </svg>
          </div>
        </div>

        <!-- Basket button — ic/in-basket from Aura DS Neo4j -->
